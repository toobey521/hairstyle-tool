<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="UTF-8"><meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Toobey 发型设计助手 v3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0d1117;--bg-card:#161b22;--border:#30363d;--text:#e6edf3;--text-dim:#8b949e;--accent:#3b82f6;--good:#22c55e;--bad:#ef4444;--radius:12px}
body{background:var(--bg);color:var(--text);font-family:sans-serif}.ct{max-width:960px;margin:0 auto;padding:20px}
hd{text-align:center;display:block;padding:28px 0}hd h1{font-size:28px;background:linear-gradient(135deg,#3b82f6,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.st{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;margin-bottom:12px}
.sp{display:none;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}.sp.on{display:block}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:8px}
.fg{display:flex;flex-direction:column;gap:4px}.fg label{font-size:12px;color:var(--text-dim)}
.fg input,.fg select{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-size:13px;outline:none}
.grp{display:flex;gap:8px}.grp label{display:flex;align-items:center;gap:4px;padding:6px 14px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:13px}
.grp label.sel{border-color:var(--accent);color:#fff;background:rgba(59,130,246,.2)}
.grp input[type=radio]{display:none}
.tsb{display:flex;gap:8px;margin:12px 0}.tbtn{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text-dim);cursor:pointer;font-size:13px;text-align:center}
.tbtn:hover{border-color:var(--accent)}.tbtn:disabled{opacity:.5}.tbtn.ok{border-color:var(--good);color:var(--good)}.tbtn.er{border-color:var(--bad);color:var(--bad)}
.ua{background:var(--bg-card);border:2px dashed var(--border);border-radius:var(--radius);padding:40px;text-align:center;cursor:pointer;margin-bottom:16px}
.pre{position:relative;display:inline-block;max-width:280px}.pre img{width:100%;border-radius:8px}
.fss{display:none;padding:16px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px}.fss.on{display:block}
.sg{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.sb{padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text-dim);cursor:pointer;font-size:12px;text-align:center}
.sb.sel{background:var(--accent);color:#fff}
.bn{width:100%;padding:12px;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer}.bn:disabled{opacity:.4}
.bp{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff}.bs{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff}
.ab{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.prw{display:none;margin-bottom:16px}.prw.on{display:block}.pbar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}.pfl{height:100%;width:0%;background:linear-gradient(90deg,#3b82f6,#a855f7);transition:width .3s}
.rs{display:none}.rs.on{display:block}
.tb{display:flex;gap:4px;background:var(--bg-card);border-radius:var(--radius);padding:4px;margin-bottom:16px}
.t2{flex:1;padding:10px;text-align:center;border:none;background:transparent;color:var(--text-dim);cursor:pointer;border-radius:8px;font-size:14px}
.t2.sel{background:var(--accent);color:#fff}
.tc{display:none}.tc.on{display:block}
.ac{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;font-size:14px;line-height:1.8}
.sg2{display:grid;grid-template-columns:1fr;gap:20px}
.sc{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.sc-hd{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.sc-hd h3{font-size:15px}.sc-hd .csel{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim)}
.sc-hd .csel select{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:3px 6px;color:var(--text);font-size:12px;outline:none}
.sc-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;padding:14px 16px}
.sc-card{border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:.2s;cursor:pointer}
.sc-card:hover{transform:translateY(-2px);border-color:var(--accent)}
.sc-card-img{width:100%;aspect-ratio:1;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text-dim);overflow:hidden}
.sc-card-img img{width:100%;height:100%;object-fit:cover}
.sc-card-ft{padding:8px 10px;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text-dim)}
.sc-card-ft .tag-done{font-size:10px;padding:2px 8px;border-radius:3px;background:var(--good);color:#fff}
.sc-card-ft .tag-gen{font-size:10px;padding:2px 8px;border-radius:3px;background:var(--accent);color:#fff}
.gbtn{width:100%;padding:9px;margin:0 16px 14px;border:1px solid var(--accent);border-radius:6px;background:transparent;color:var(--accent);cursor:pointer;font-size:13px;font-weight:600;width:calc(100% - 32px)}
.gbtn:disabled{opacity:.4}
.gen-row{display:flex;gap:10px;padding:0 16px 14px}.gen-row .gbtn{flex:1;margin:0;min-width:0;display:inline-flex;align-items:center;justify-content:center}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(8px)}
.mo.on{display:flex}.mc{max-width:700px;width:92%;position:relative}
.mc img{width:100%;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6)}
.mc-close{position:absolute;top:-36px;right:0;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;opacity:.7}
.mc-info{color:var(--text-dim);font-size:13px;margin-top:10px;text-align:center}
.spi{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
.ti{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;font-size:13px;color:var(--text-dim);line-height:1.6}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 24px;z-index:2000;transition:.3s;opacity:0;white-space:nowrap}
.toast.on{opacity:1}.toast.ok{border-color:var(--good)}.toast.er{border-color:var(--bad)}
@media(max-width:600px){.fr,.f3{grid-template-columns:1fr}.sg{grid-template-columns:repeat(3,1fr)}.sc-gallery{grid-template-columns:repeat(2,1fr)}}
</style></head><body><div class="ct">

<hd><h1>Toobey 发型设计助手 v3</h1><p style="color:var(--text-dim);font-size:14px;margin-top:8px">上传照片 + 性别/年龄 AI 分析 + 批量生成高清发型形象</p></hd>

<!-- Settings -->
<div class="st" id="stBtn" onclick="ts()"><span>API 设置</span><span style="margin-left:auto;color:var(--text-dim);font-size:12px" id="stStatus">未配置</span></div>
<div class="sp" id="sp">

<!-- Provider selector -->
<div style="margin-bottom:12px">
<label style="font-size:12px;color:var(--text-dim);display:block;margin-bottom:6px">选择 AI 服务商 (自动填充地址和模型)</label>
<select id="provider" onchange="onProviderChange()" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;color:var(--text);font-size:14px;outline:none">
<option value="">-- 手动配置 --</option>
<option value="deepseek">DeepSeek (deepseek-chat) — 支持视觉</option>
<option value="openai">OpenAI (gpt-4o / gpt-4o-mini) — 支持视觉</option>
<option value="anthropic">Anthropic (claude-sonnet-4-20250514) — 支持视觉</option>
<option value="qwen">阿里通义千问 (qwen-vl-max / qwen2.5-vl-72b) — 支持视觉</option>
<option value="zhipu">智谱 GLM-4V (glm-4v-plus) — 支持视觉</option>
<option value="moonshot">月之暗面 Moonshot (moonshot-v1-8k) — 支持视觉</option>
<option value="step">阶跃星辰 Step (step-1v-8k) — 支持视觉</option>
<option value="agnes">Agnes (agnes-2.0-flash) — 仅图片生成</option>
</select>
</div>

<div class="f3">
<div class="fg"><label>API 地址</label><input id="bu" value="https://api.deepseek.com"></div>
<div class="fg"><label>API Key</label><input id="ak" type="password"></div>
<div class="fg"><label>模型名</label><input id="mo" value="deepseek-chat"></div>
</div>
<div class="fr">
<div class="fg"><label>Max Tokens</label><input id="mt" type="number" value="4096"></div>
<div class="fg"><label>温度</label><input id="tmp" type="number" step="0.1" value="0.3" min="0" max="2"></div>
</div>
<div class="tsb">
<button class="tbtn" onclick="sv()">保存设置</button>
<button class="tbtn" id="testBtn" onclick="testAPI()">测试连接</button>
</div>
<div style="font-size:11px;color:var(--text-dim);padding:6px 0" id="apiTestResult"></div>
<div style="margin-top:8px;display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px">
<label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--text-dim);flex:1">
<input type="checkbox" id="cp" onchange="sv()" style="accent-color:var(--accent)"> 跨域代理 (双击HTML时启用)
</label>
<input id="cpu" value="https://api.allorigins.win/raw?url=" style="flex:2;background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:4px 8px;color:var(--text-dim);font-size:11px;outline:none">
</div>

<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px"><div style="font-size:12px;color:var(--text-dim);margin-bottom:6px">图片生成API (可选, 不配则只给建议提示词)</div>
<div class="f3">
<div class="fg"><label>API 地址</label><input id="iu"></div>
<div class="fg"><label>Key(共用留空)</label><input id="ik" type="password"></div>
<div class="fg"><label>模型</label><input id="im" value="dall-e-3"></div>
</div>
<div class="fr"><div class="fg"><label>尺寸</label><select id="is"><option>512x512</option><option>1024x1024</option><option>1024x1792</option><option>1792x1024</option></select></div><div></div></div>
</div></div>

<!-- Gender/Age -->
<div style="display:flex;gap:10px;margin-bottom:12px;align-items:flex-end">
<div style="flex:1"><label style="font-size:12px;color:var(--text-dim);display:block;margin-bottom:6px">性别</label><div class="grp" id="genderGrp">
<label class="sel"><input type="radio" name="g" value="male" checked>👦 男</label>
<label><input type="radio" name="g" value="female">👧 女</label></div></div>
<div style="flex:1"><label style="font-size:12px;color:var(--text-dim);display:block;margin-bottom:6px">年龄</label><input id="age" type="number" value="30" min="1" max="120" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-size:13px;outline:none;box-sizing:border-box"></div>
<div style="flex:1"><div id="profileTag" style="padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;color:var(--text-dim);text-align:center;background:var(--bg)">30岁男性</div></div></div>

<!-- Upload -->
<div class="ua" id="ua" onclick="document.getElementById('fi').click()">
<input type="file" id="fi" accept="image/*">
<div id="up"><p><strong>点击上传</strong> 或拖拽照片</p><p style="font-size:12px;color:var(--text-dim);margin-top:4px">建议正面免冠光线均匀</p></div>
<div class="pre" id="pre" style="display:none"><img id="pi"><button style="position:absolute;top:-8px;right:-8px;width:24px;height:24px;border-radius:50%;background:var(--bad);color:#fff;border:none;cursor:pointer" onclick="event.stopPropagation();rm()">x</button></div></div>

<!-- Face shape -->
<div class="fss" id="fss"><div style="font-size:12px;color:var(--text-dim);margin-bottom:6px">脸型(可手动修正)</div>
<div class="sg" id="sg">
<div class="sb">椭圆</div><div class="sb">圆脸</div><div class="sb">方脸</div><div class="sb">心形</div><div class="sb">菱形</div>
<div class="sb">长脸</div><div class="sb">三角</div><div class="sb">梨形</div><div class="sb">长方</div><div class="sb">倒三角</div>
</div></div>

<!-- Buttons -->
<div class="ab"><button class="bn bp" id="abtn" onclick="an()" disabled>分析脸型 + 获取发型建议</button>
<button class="bn bs" id="gbtn" onclick="gall()" style="display:none">生成全部新发型形象</button></div>

<!-- Progress -->
<div class="prw" id="pr"><div class="pbar"><div class="pfl" id="pfl"></div></div><div style="display:flex;justify-content:space-between;margin-top:4px;font-size:12px;color:var(--text-dim)"><span id="prL">...</span><span id="prP">0%</span></div></div>

<!-- Result -->
<div class="rs" id="rs"><div class="tb"><div class="t2 sel" onclick="sw('a',this)">发型建议</div><div class="t2" onclick="sw('s',this)">发型形象</div></div>
<div class="tc on" id="ta"><div class="ac" id="ac"><p style="color:var(--text-dim)">点击分析按钮开始</p></div></div>
<div class="tc" id="ts">
<div class="ti">每款发型可选择生成数量(3/5/10张)，批量生成高清效果图。点击图片放大查看。</div>
<div class="sg2" id="sg2"></div></div></div></div>

<!-- Modal -->
<div class="mo" id="mo" onclick="cm(event)"><div class="mc" onclick="event.stopPropagation()">
<button class="mc-close" onclick="cm()">x</button>
<img id="mi"><div class="mc-info" id="minfo"></div></div></div>
<div class="toast" id="toast"></div>

<script>
// ===== Provider presets =====
var PROVIDERS={
  deepseek:{bu:"https://api.deepseek.com",mo:"deepseek-chat",iu:"",im:"dall-e-3",desc:"DeepSeek Chat — 支持图片理解"},
  openai:{bu:"https://api.openai.com",mo:"gpt-4o",iu:"",im:"dall-e-3",desc:"GPT-4o — 支持图片理解"},
  anthropic:{bu:"https://api.anthropic.com",mo:"claude-sonnet-4-20250514",iu:"",im:"dall-e-3",desc:"Claude Sonnet 4 — 支持图片理解"},
  qwen:{bu:"https://dashscope.aliyuncs.com",mo:"qwen-vl-max",iu:"",im:"dall-e-3",desc:"通义千问VL Max — 支持图片理解"},
  zhipu:{bu:"https://open.bigmodel.cn/api/paas/v4",mo:"glm-4v-plus",iu:"",im:"cogview-3",desc:"GLM-4V Plus — 支持图片理解"},
  moonshot:{bu:"https://api.moonshot.cn",mo:"moonshot-v1-8k",iu:"",im:"dall-e-3",desc:"Moonshot v1 — 支持图片理解"},
  step:{bu:"https://api.stepfun.com",mo:"step-1v-8k",iu:"",im:"dall-e-3",desc:"Step 1V — 支持图片理解"},
  agnes:{bu:"https://apihub.agnes-ai.com",mo:"agnes-2.0-flash",iu:"https://apihub.agnes-ai.com",im:"agnes-image-2.0-flash",desc:"Agnes — 支持视觉+生图"}
};

function onProviderChange(){
  var sel=document.getElementById("provider").value;
  if(!sel)return;
  var p=PROVIDERS[sel];
  if(p){
    document.getElementById("bu").value=p.bu;
    document.getElementById("mo").value=p.mo;
    document.getElementById("iu").value=p.iu||p.bu;
    document.getElementById("im").value=p.im||p.mo;
    tt("已自动填入 "+sel,"ok");
  }
}

// ===== Config =====
var D={bu:"https://api.deepseek.com",ak:"cpk-AEGnP6U2NBdoJWYANCrhBw6ZuboWIWu5S9eAOdwC3E5tgA2J",mo:"deepseek-chat",mt:4096,tmp:0.3,iu:"",ik:"",im:"dall-e-3",is:"1024x1024",provider:"",cp:false,cpu:"https://api.allorigins.win/raw?url="};
function ld(){var s=JSON.parse(localStorage.getItem("hs4")||"{}");for(var k in D){var el=document.getElementById(k);if(el)el.value=s[k]!==void 0?s[k]:D[k];}updSt();}
function sv(){// Save & auto-fill image gen from analysis
var ids=["bu","ak","mo","mt","tmp","iu","ik","im","is","provider"];
// Auto-fill image gen: 地址/key/模型与分析API保持一致
var bu=document.getElementById("bu").value;
var ak=document.getElementById("ak").value;
var mo=document.getElementById("mo").value;
var iuEl=document.getElementById("iu");
if(!iuEl.value)iuEl.value=bu;
else{// Auto-correct image gen URL
  var v=iuEl.value.trim();
  if(!v.startsWith("http"))v="https://"+v;
  v=v.replace(/\/+$/,"").replace(/\/v1.*/,"");
  iuEl.value=v;
}
if(!document.getElementById("ik").value)document.getElementById("ik").value=ak;
if(!document.getElementById("im").value)document.getElementById("im").value=mo;
var s={};ids.forEach(function(id){s[id]=document.getElementById(id).value;});
localStorage.setItem("hs4",JSON.stringify(s));updSt();tt("已保存","ok");}
function gs(){var s=JSON.parse(localStorage.getItem("hs4")||"{}");for(var k in D){if(!(k in s))s[k]=D[k];}return s;}
function updSt(){document.getElementById("stStatus").textContent=gs().ak?"已配置":"未配置";}
function ts(){document.getElementById("sp").classList.toggle("on");}

// ===== API Test =====
async function testAPI(){
  var btn=document.getElementById("testBtn");btn.disabled=true;btn.innerHTML="测试中...";
  var el=document.getElementById("apiTestResult");el.innerHTML="";
  var s=gs();if(!s.ak||!s.bu){el.innerHTML="请先填写API Key并保存";btn.disabled=false;btn.innerHTML="测试连接";return;}
  sv();s=gs();
  var bu=s.bu.replace(/\/+$/,"");var key=s.ak;var model=s.mo||"deepseek-chat";
  try{
    // Try /v1/models first
    var url=bu+"/v1/models";
    var r=await fetch(url,{method:"GET",headers:{"Authorization":"Bearer "+key}});
    if(r.ok){
      var d=await r.json();
      var models=(d.data||[]).map(function(m){return m.id;}).join(", ")||"获取模型列表成功";
      el.innerHTML="连接成功! 模型列表: "+models;btn.className="tbtn ok";
    }else{
      // Fallback: try /v1/chat/completions with minimal request
      var url2=bu+"/v1/chat/completions";
      if(bu.indexOf("anthropic")>=0){
        // Anthropic uses different endpoint
        url2=bu+"/v1/messages";
        var r2=await fetch(url2,{method:"POST",headers:{"x-api-key":key,"Content-Type":"application/json","anthropic-version":"2023-06-01"},body:JSON.stringify({model:model,max_tokens:1,messages:[{role:"user",content:"hi"}]})});
        if(r2.ok){el.innerHTML="连接成功! Anthropic "+model+"可用";btn.className="tbtn ok";}
        else{var t=await r2.text().catch(function(){return"";});el.innerHTML="失败 HTTP"+r2.status+(t?": "+t.slice(0,100):"");btn.className="tbtn er";}
      }else{
        var r2=await fetch(url2,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},body:JSON.stringify({model:model,messages:[{role:"user",content:"hi"}],max_tokens:1})});
        if(r2.ok){el.innerHTML="连接成功! "+model+"可用";btn.className="tbtn ok";}
        else{var t2=await r2.text().catch(function(){return"";});el.innerHTML="失败 HTTP"+r2.status+(t2?": "+t2.slice(0,100):"");btn.className="tbtn er";}
      }
    }
  }catch(e){el.innerHTML="连接失败:"+e.message;btn.className="tbtn er";}
  btn.disabled=false;btn.innerHTML="测试连接";
}

// ===== Gender/Age =====
var gbs=document.querySelectorAll("#genderGrp label");for(var i=0;i<gbs.length;i++){gbs[i].addEventListener("click",function(){document.querySelectorAll("#genderGrp label").forEach(function(l){l.classList.remove("sel");});this.classList.add("sel");updateProfile();});}
document.getElementById("age").addEventListener("input",updateProfile);
function getGender(){var r=document.querySelector("input[name=g]:checked");return r?r.value:"male";}
function updateProfile(){document.getElementById("profileTag").textContent=(document.getElementById("age").value||30)+"岁"+(getGender()==="male"?"男性":"女性");}

// ===== Upload =====
var img="";var ua=document.getElementById("ua");
ua.addEventListener("dragover",function(e){e.preventDefault();});ua.addEventListener("drop",function(e){e.preventDefault();if(e.dataTransfer.files.length)hf(e.dataTransfer.files[0]);});
document.getElementById("fi").addEventListener("change",function(){if(this.files.length)hf(this.files[0]);});
function hf(f){if(!f||!f.type.startsWith("image/")){tt("请上传图片","er");return;}var r=new FileReader();r.onload=function(e){img=e.target.result;document.getElementById("pi").src=img;document.getElementById("pre").style.display="inline-block";document.getElementById("up").style.display="none";document.getElementById("abtn").disabled=false;tt("已上传","ok");};r.readAsDataURL(f);}

function buildChatUrl(bu){

  if(bu.indexOf("/v1")>=0)return bu+"/chat/completions";

}

// ===== Image compression =====
function compressImage(dataUrl,maxW){
  return new Promise(function(resolve){
    var img=new Image();
    img.onload=function(){
      var w=img.width,h=img.height;
      if(w<=maxW&&h<=maxW){resolve(null);return;}
      var ratio=Math.min(maxW/w,maxW/h);
      var c=document.createElement("canvas");
      c.width=w*ratio;c.height=h*ratio;
      var ctx=c.getContext("2d");
      ctx.drawImage(img,0,0,c.width,c.height);
      resolve(c.toDataURL("image/jpeg",0.85));
    };
    img.onerror=function(){resolve(null);};
    img.src=dataUrl;
  });
}
